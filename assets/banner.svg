<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NameLens README banner</title>
  <desc id="desc">NameLens: Naming research for open-source projects.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="65%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#d9b66f" stop-opacity="0.42"/>
      <stop offset="38%" stop-color="#9d7a3c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lensCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4efe2" stop-opacity="0.58"/>
      <stop offset="46%" stop-color="#9b9b93" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.08"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4df9b"/>
      <stop offset="38%" stop-color="#8c7344"/>
      <stop offset="74%" stop-color="#eeeeea"/>
      <stop offset="100%" stop-color="#6b562f"/>
    </linearGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#050505"/>
  <rect width="1920" height="1080" fill="url(#goldGlow)"/>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.45"/>

  <g opacity="0.34" stroke="#d9d5ca" stroke-width="1">
    <path d="M1050 250H1510" opacity="0.22"/>
    <path d="M1120 330H1640" opacity="0.16"/>
    <path d="M980 735H1480" opacity="0.14"/>
    <path d="M1190 810H1690" opacity="0.1"/>
  </g>

  <g transform="translate(1170 492) rotate(-12)">
    <ellipse cx="0" cy="0" rx="266" ry="266" fill="url(#lensCore)" opacity="0.76"/>
    <ellipse cx="0" cy="0" rx="266" ry="266" fill="none" stroke="url(#rim)" stroke-width="14"/>
    <ellipse cx="-48" cy="-58" rx="112" ry="68" fill="#ffffff" opacity="0.08" filter="url(#softBlur)"/>
    <path d="M185 190L407 412" stroke="url(#rim)" stroke-width="34" stroke-linecap="round"/>
    <path d="M196 203L395 402" stroke="#f2e6bd" stroke-width="5" stroke-linecap="round" opacity="0.42"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="148" y="414" fill="#f5f2ea" font-size="138" font-weight="760" letter-spacing="0">NameLens</text>
    <text x="154" y="496" fill="#cfc8b7" font-size="44" font-weight="420" letter-spacing="0">Naming research for open-source projects</text>

    <g transform="translate(154 605)" font-size="28" font-weight="560">
      <rect x="0" y="0" width="132" height="54" rx="27" fill="#161410" stroke="#a98949" stroke-opacity="0.55"/>
      <text x="34" y="36" fill="#ead9a5">Search</text>
      <rect x="154" y="0" width="162" height="54" rx="27" fill="#161410" stroke="#a98949" stroke-opacity="0.55"/>
      <text x="188" y="36" fill="#ead9a5">Collision</text>
      <rect x="338" y="0" width="152" height="54" rx="27" fill="#161410" stroke="#a98949" stroke-opacity="0.55"/>
      <text x="372" y="36" fill="#ead9a5">Decision</text>
    </g>
  </g>
</svg>
